name: JFrog CI Pipeline
on: [push]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup JFrog CLI
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
        with:
          oidc-provider-name: github-oidc

      # FIX: Configure Maven and force the server-id to match Artifactory
      - name: Configure Maven
        run: |
          jf mvnc --repo-resolve-releases maven-remote \
                  --repo-resolve-snapshots maven-remote \
                  --server-id-resolve default-server

      # Step 1 & 2: Compile & Run Tests
      # The '--server-id' flag here ensures the URL is passed correctly
      - name: Build and Test
        run: jf mvn clean test --server-id default-server

      # Step 3 & 4: Package & Publish Docker Image
      - name: Docker Build and Push
        run: |
          # Extract domain from URL (e.g., instance.jfrog.io)
          DOMAIN=$(echo "${{ secrets.JF_URL }}" | sed 's/https:\/\///')
          IMAGE_TAG=$DOMAIN/docker-local/spring-petclinic:${{ github.run_number }}
          
          docker build -t $IMAGE_TAG .
          
          # Push and publish build metadata
          jf docker push $IMAGE_TAG
          jf rt build-collect-env
          jf rt build-add-git
          jf rt build-publish
