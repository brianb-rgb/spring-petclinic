# .github/workflows/frogbot.yml

name: Frogbot Scan

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read
  security-events: write

jobs:
  scan-pull-request:
    runs-on: ubuntu-latest
    environment: Config

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run Frogbot Scan
        uses: jfrog/frogbot@v2
        env:
          # JFrog Platform credentials
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

          # GitHub token for PR comments
          JF_GIT_TOKEN: ${{ secrets.JF_GIT_TOKEN}}

          # Optional: Specify package manager (npm, maven, gradle, pip, etc.)
          JF_PACKAGE_MANAGER: maven

          # Optional: Fail the build if violations are found
          JF_FAIL_ON_SECURITY_ISSUES: "true"
