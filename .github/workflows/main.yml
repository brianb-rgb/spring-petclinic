name: JFrog CI Pipeline
on: [push]

permissions:
  id-token: write
  contents: read

env:
  JFROG_CLI_BUILD_NAME: ${{ github.repository }}-build
  JFROG_CLI_BUILD_NUMBER: ${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Config
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      - name: Collect Build Metadata
        run: |
          jf rt build-collect-env
          jf rt build-add-git

      - name: Register JFrog Server
        run: |
          jf c add artifactory \
            --url="${{ secrets.JF_URL }}" \
            --access-token="${{ secrets.JF_ACCESS_TOKEN }}" \
            --interactive=false
          jf c use artifactory
          jf c show

      - name: Configure Maven
        run: |
          jf mvnc \
            --repo-resolve-releases  spring-libs-release \
            --repo-resolve-snapshots spring-libs-snapshot \
            --repo-deploy-releases   spring-libs-release-local \
            --repo-deploy-snapshots  spring-libs-snapshot-local

      - name: Build, Test and Deploy
        run: jf mvn clean deploy

      # 4. Package & Publish Docker Image
      - name: Docker Build and Push
        run: |
          # Clean URL for Docker registry
          DOMAIN=$(echo "${{ secrets.JF_URL }}" | sed 's/https:\/\///')
          IMAGE_TAG=$DOMAIN/bb-docker-local/spring-petclinic:${{ github.run_number }}
          
          # Build the image using Spring Boot Buildpacks (no Dockerfile needed)
          ./mvnw spring-boot:build-image -Dspring-boot.build-image.imageName=$IMAGE_TAG
          
          # Push image & Publish Build Info (Traceability)
          jf docker push $IMAGE_TAG
          jf rt build-collect-env
          jf rt build-add-git
          jf rt build-publish
