name: JFrog CI Pipeline
on: [push]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # This ensures the URL is available to all steps in this job
      JF_URL: ${{ secrets.JF_URL }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        with:
          oidc-provider-name: github-oidc # Must match JFrog Integration Name

      # This step creates the 'settings.xml' for Maven
      - name: Configure Maven
        run: |
          jf mvnc --repo-resolve-releases maven-remote \
                  --repo-resolve-snapshots maven-remote

      # Step 1 & 2: Compile & Run Tests
      # We removed --server-id to let it use the default OIDC config
      - name: Build and Test
        run: jf mvn clean test

      # Step 3 & 4: Package & Publish Docker Image
      - name: Docker Build and Push
        run: |
          # Clean the URL to get just the domain (e.g. name.jfrog.io)
          DOMAIN=$(echo "${{ secrets.JF_URL }}" | sed 's/https:\/\///' | sed 's/\///g')
          IMAGE_TAG=$DOMAIN/docker-local/spring-petclinic:${{ github.run_number }}
          
          docker build -t $IMAGE_TAG .
          
          # Push image and publish Build Info
          jf docker push $IMAGE_TAG
          jf rt build-collect-env
          jf rt build-add-git
          jf rt build-publish
