name: JFrog CI Pipeline
on: [push]

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup JFrog CLI using OIDC (Best Practice)
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
        with:
          oidc-provider-name: github-oidc

      # 2. Resolve Dependencies via Artifactory
      - name: Configure Maven
        run: |
          jf mvnc --server-id-resolve artifactory \
                  --repo-resolve-releases maven-remote \
                  --repo-resolve-snapshots maven-remote

      # 3. Compile & Run Tests
      - name: Build and Test
        run: jf mvn clean test

      # 4. Package & Publish Docker Image
      - name: Docker Build and Push
        run: |
          # Clean URL for Docker registry
          DOMAIN=$(echo "${{ secrets.JF_URL }}" | sed 's/https:\/\///')
          IMAGE_TAG=$DOMAIN/docker-local/spring-petclinic:${{ github.run_number }}
          
          # Build the image
          docker build -t $IMAGE_TAG .
          
          # Push image & Publish Build Info (Traceability)
          jf docker push $IMAGE_TAG
          jf rt build-collect-env
          jf rt build-add-git
          jf rt build-publish
